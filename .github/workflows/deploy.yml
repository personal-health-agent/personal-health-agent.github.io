name: Deploy site to GitHub Pages

# This workflow assumes the site folder is the repository root.
# If instead you push the site at a subdirectory of a larger repo, copy this
# file to that repo's .github/workflows/, change SITE_DIR to the subpath,
# and add a `paths:` filter on the push trigger.
#
# The workflow auto-detects the correct SITE_URL and BASE_PATH from the
# GitHub Pages API (so it adapts to repo renames, custom domains, and
# user/project sites without code changes). To force specific values, set
# `SITE_URL` and/or `BASE_PATH` as repository Variables — those win over
# auto-detection.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  SITE_DIR: '.'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ env.SITE_DIR }}/package-lock.json

      - name: Resolve site URL and base path
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OVERRIDE_SITE_URL: ${{ vars.SITE_URL }}
          OVERRIDE_BASE_PATH: ${{ vars.BASE_PATH }}
        run: |
          set -euo pipefail

          # Try the GitHub Pages API for the authoritative public URL.
          # Returns e.g. "https://orsonxu.com/course-pha-columbia/" when a custom
          # domain is configured on the owner's user pages, or
          # "https://owner.github.io/repo/" when it isn't.
          HTML_URL=""
          if HTML_URL_RAW=$(curl -sf \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" 2>/dev/null); then
            HTML_URL=$(echo "$HTML_URL_RAW" | jq -r '.html_url // empty')
          fi

          if [ -n "$HTML_URL" ]; then
            HTML_URL="${HTML_URL%/}"
            SITE_URL=$(echo "$HTML_URL" | grep -oE '^https?://[^/]+')
            BASE_PATH="${HTML_URL#$SITE_URL}"
            [ -z "$BASE_PATH" ] && BASE_PATH="/"
            echo "Pages API resolved → $HTML_URL"
          else
            # Fallback if Pages isn't configured yet (first deploy).
            OWNER_LC=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
            REPO_NAME="${GITHUB_REPOSITORY##*/}"
            REPO_LC=$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')
            SITE_URL="https://${OWNER_LC}.github.io"
            if [ "$REPO_LC" = "${OWNER_LC}.github.io" ]; then
              BASE_PATH="/"
            else
              BASE_PATH="/${REPO_NAME}"
            fi
            echo "Pages API unavailable; defaulting to $SITE_URL$BASE_PATH"
          fi

          # Repository Variables override the auto-detected values.
          [ -n "$OVERRIDE_SITE_URL" ]  && SITE_URL="$OVERRIDE_SITE_URL"  && echo "Override SITE_URL → $SITE_URL"
          [ -n "$OVERRIDE_BASE_PATH" ] && BASE_PATH="$OVERRIDE_BASE_PATH" && echo "Override BASE_PATH → $BASE_PATH"

          echo "SITE_URL=$SITE_URL"   >> "$GITHUB_OUTPUT"
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_OUTPUT"
          echo ""
          echo "Building with:"
          echo "  SITE_URL  = $SITE_URL"
          echo "  BASE_PATH = $BASE_PATH"

      - name: Install dependencies
        working-directory: ${{ env.SITE_DIR }}
        run: npm ci || npm install

      - name: Build
        working-directory: ${{ env.SITE_DIR }}
        env:
          SITE_URL: ${{ steps.resolve.outputs.SITE_URL }}
          BASE_PATH: ${{ steps.resolve.outputs.BASE_PATH }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.SITE_DIR }}/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
